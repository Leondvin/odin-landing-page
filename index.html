<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
    <header>
        <div class="logo">Header Logo</div>
        <nav>
            <ul>
                <li><a href="#">header link one</a></li>
                <li><a href="#">header link two</a></li>
                <li><a href="#">header link three</a></li>
            </ul>
        </nav>
    </header>
    <div class="hero">
        <div class="hero-text">
            <h1 class="hero-main-text"></h1>
            <p class="hero-secondary-text"></p>
            <button class="hero-cta-btn"></button>
        </div>
        <img class="hero-img" src="" alt="">
    </div>
    <div class="info">
        <h2 class="info-main-text"></h2>
        <div class="cards">
            <div class="card">
                <img class="card-img" src="" alt="">
                <p class="card-text"></p>
            </div>
            <div class="card">
                <img class="card-img" src="" alt="">
                <p class="card-text"></p>
            </div>
            <div class="card">
                <img class="card-img" src="" alt="">
                <p class="card-text"></p>
            </div>
            <div class="card">
                <img class="card-img" src="" alt="">
                <p class="card-text"></p>
            </div>
        </div>
    </div>
    <div class="testimonial">
        <div class="testimonial-text"></div>
        <div class="testimonial-author"></div>
    </div>
    <div class="cta">
        <div class="cta-text">
            <h2 class="cta-main-text"></h2>
            <p class="cta-secondary-text"></p>
        </div>
        <button class="cta-btn"></button>
    </div>
    <footer></footer>
</body>
</html>
